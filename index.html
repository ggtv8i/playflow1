<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PlayFlow — العب · أنشئ · تواصل</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { overflow:hidden; }

    /* ─── BG ─── */
    .bg {
      position:fixed; inset:0; background:var(--bg); overflow:hidden;
    }
    .bg-grid {
      position:absolute; inset:-60px;
      background-image:
        linear-gradient(rgba(0,245,212,0.04) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,245,212,0.04) 1px,transparent 1px);
      background-size:60px 60px; animation:gridMove 14s linear infinite;
    }
    .orb {
      position:absolute; border-radius:50%; filter:blur(90px); opacity:0.12; animation:float 9s ease-in-out infinite;
    }
    .orb-1 { width:550px;height:550px;background:var(--purple);top:-220px;right:-120px;animation-delay:0s; }
    .orb-2 { width:450px;height:450px;background:var(--cyan);  bottom:-180px;left:-120px;animation-delay:3s; }
    .orb-3 { width:300px;height:300px;background:var(--pink);  top:55%;right:-60px;    animation-delay:5.5s; }
    .scan {
      position:absolute; left:0; right:0; height:2px;
      background:linear-gradient(90deg,transparent,rgba(0,245,212,0.25),transparent);
      animation:scanLine 5s linear infinite; pointer-events:none;
    }

    /* ─── Floating cards ─── */
    .float-cards { position:fixed; inset:0; pointer-events:none; overflow:hidden; }
    .fc {
      position:absolute; width:76px;height:76px;border-radius:18px;
      background:rgba(22,22,42,0.85); border:1px solid var(--border);
      display:flex; align-items:center; justify-content:center;
      font-size:30px; box-shadow:0 12px 40px rgba(0,0,0,0.6);
      opacity:0.55; animation:float 6s ease-in-out infinite;
    }
    .fc-1{top:12%;left:4%;animation-delay:0s;}
    .fc-2{top:18%;right:5%;animation-delay:1.8s;}
    .fc-3{bottom:22%;left:6%;animation-delay:2.9s;}
    .fc-4{bottom:18%;right:5%;animation-delay:0.9s;}
    .fc-5{top:42%;left:2%;animation-delay:4s;}

    /* ─── Main splash ─── */
    .splash {
      position:relative; z-index:10;
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:40px 28px; gap:0;
    }

    /* ─── Logo ─── */
    .logo-wrap {
      display:flex; flex-direction:column; align-items:center;
      margin-bottom:20px;
      animation:fadeUp 0.8s ease both;
    }
    .logo-icon { width:86px;height:86px;margin-bottom:18px;position:relative; }
    .logo-icon svg {
      width:100%;height:100%;
      filter:drop-shadow(0 0 18px rgba(0,245,212,0.85)) drop-shadow(0 0 50px rgba(0,245,212,0.25));
      animation:pulse 3.5s ease-in-out infinite;
    }
    .logo-title {
      font-family:'Orbitron',sans-serif; font-size:clamp(38px,9vw,58px);
      font-weight:900; letter-spacing:5px; text-transform:uppercase;
      background:linear-gradient(135deg,var(--cyan) 0%,#fff 50%,var(--pink) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      animation:neonFlicker 7s ease-in-out infinite;
    }
    .logo-sub {
      font-family:'Rajdhani',sans-serif; font-size:12px; font-weight:600;
      letter-spacing:5px; text-transform:uppercase; color:var(--muted); margin-top:10px;
    }

    /* ─── Tagline ─── */
    .tagline {
      text-align:center; margin-bottom:44px;
      animation:fadeUp 0.9s 0.15s ease both;
    }
    .tagline h2 {
      font-family:'Rajdhani',sans-serif; font-size:clamp(18px,4.5vw,26px);
      font-weight:600; color:var(--text); line-height:1.45;
    }
    .tagline .hl  { color:var(--cyan);   text-shadow:0 0 18px rgba(0,245,212,0.45); }
    .tagline .hl2 { color:var(--pink);   text-shadow:0 0 18px rgba(247,37,133,0.4); }
    .tagline p    { color:var(--muted);  font-size:13px; margin-top:10px; letter-spacing:0.5px; }

    /* ─── CTA ─── */
    .cta-area {
      display:flex; flex-direction:column; align-items:center; gap:14px;
      width:100%; max-width:360px;
      animation:fadeUp 1s 0.3s ease both;
    }
    .btn-google {
      display:flex; align-items:center; justify-content:center; gap:12px;
      width:100%; padding:16px 28px; background:#fff; border-radius:50px;
      font-family:'Rajdhani',sans-serif; font-weight:700; font-size:16px;
      letter-spacing:0.3px; color:#1a1a1a;
      box-shadow:0 4px 24px rgba(0,0,0,0.45); transition:all 0.3s; border:none; cursor:pointer;
    }
    .btn-google:hover { transform:translateY(-3px); box-shadow:0 10px 36px rgba(255,255,255,0.18); }
    .btn-google .g-logo {
      width:22px;height:22px; border-radius:50%;
      background:linear-gradient(135deg,#4285f4,#ea4335,#fbbc05,#34a853);
      display:flex; align-items:center; justify-content:center;
      font-size:13px; font-weight:900; color:#fff; flex-shrink:0;
    }

    .sep {
      display:flex; align-items:center; gap:12px; width:100%;
      color:var(--muted); font-size:11px; letter-spacing:1px; text-transform:uppercase;
    }
    .sep::before,.sep::after { content:'';flex:1;height:1px;background:var(--border); }

    .btn-guest {
      width:100%; padding:14px; background:transparent;
      border:1.5px solid rgba(0,245,212,0.3); border-radius:50px;
      font-family:'Rajdhani',sans-serif; font-weight:700;
      font-size:15px; letter-spacing:1px; text-transform:uppercase;
      color:var(--cyan); transition:all 0.3s; cursor:pointer;
    }
    .btn-guest:hover { border-color:var(--cyan); background:rgba(0,245,212,0.08); box-shadow:var(--glow-c); }

    /* ─── Feature pills ─── */
    .pills {
      display:flex; gap:10px; flex-wrap:wrap; justify-content:center;
      margin-top:36px; animation:fadeUp 1.1s 0.5s ease both;
    }
    .pill {
      display:flex; align-items:center; gap:6px;
      padding:7px 14px; border-radius:20px;
      background:rgba(255,255,255,0.03); border:1px solid var(--border);
      font-size:12px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase;
    }
    .pill svg { width:13px;height:13px; }
    .p1 { color:var(--cyan); }
    .p2 { color:var(--pink); }
    .p3 { color:var(--yellow); }
    .p4 { color:#c77dff; }

    /* ─── Stats row ─── */
    .stats-row {
      display:flex; gap:28px; margin-top:32px;
      animation:fadeUp 1.2s 0.65s ease both;
    }
    .stat { display:flex; flex-direction:column; align-items:center; gap:2px; }
    .stat-val {
      font-family:'Orbitron',sans-serif; font-size:20px; font-weight:700;
      background:linear-gradient(135deg,var(--cyan),#fff);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .stat-lbl { font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }

    /* ─── Version ─── */
    .ver {
      position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
      font-size:10px; color:rgba(255,255,255,0.12);
      letter-spacing:2px; text-transform:uppercase; font-family:'Orbitron',sans-serif;
    }
  </style>
</head>
<body>
  <!-- BG -->
  <div class="bg">
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="scan"></div>
  </div>

  <!-- Floating cards -->
  <div class="float-cards">
    <div class="fc fc-1">🐍</div>
    <div class="fc fc-2">🧱</div>
    <div class="fc fc-3">🚀</div>
    <div class="fc fc-4">🎮</div>
    <div class="fc fc-5">💎</div>
  </div>

  <!-- Splash -->
  <div class="splash">
    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="50,6 94,28 94,72 50,94 6,72 6,28" fill="none" stroke="#00f5d4" stroke-width="2.5"/>
          <polygon points="50,18 82,34 82,66 50,82 18,66 18,34" fill="none" stroke="#f72585" stroke-width="1.5" opacity="0.5"/>
          <path d="M36 32 L72 50 L36 68 Z" fill="#00f5d4" opacity="0.95"/>
          <circle cx="50" cy="50" r="6" fill="#fff" opacity="0.15"/>
        </svg>
      </div>
      <div class="logo-title">PlayFlow</div>
      <div class="logo-sub">العب · أنشئ · تواصل</div>
    </div>

    <!-- Tagline -->
    <div class="tagline">
      <h2>منصة <span class="hl">الألعاب المصغرة</span> التفاعلية<br>اكتشف وألعب <span class="hl2">آلاف الألعاب</span> أو انشر لعبتك</h2>
      <p>تصفح لا نهائي · ألعاب HTML5 · محرر كود مدمج · نشر فوري</p>
    </div>

    <!-- CTA -->
    <div class="cta-area">
      <button class="btn-google" onclick="googleLogin(this)">
        <div class="g-logo">G</div>
        الدخول عبر Google
      </button>
      <div class="sep">أو</div>
      <button class="btn-guest" onclick="guestLogin()">استعراض بدون حساب ←</button>
    </div>

    <!-- Pills -->
    <div class="pills">
      <div class="pill p1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        العب فوراً
      </div>
      <div class="pill p2">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        برمج ألعابك
      </div>
      <div class="pill p3">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        تواصل
      </div>
      <div class="pill p4">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        أرقام قياسية
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat"><span class="stat-val">2.4K</span><span class="stat-lbl">لعبة</span></div>
      <div class="stat"><span class="stat-val">18K</span><span class="stat-lbl">لاعب</span></div>
      <div class="stat"><span class="stat-val">94K</span><span class="stat-lbl">جلسة</span></div>
    </div>
  </div>

  <div class="ver">PlayFlow v1.0 · Beta</div>

  <script>
    function googleLogin(btn){
      btn.innerHTML = '<div class="ring" style="width:20px;height:20px;border-width:2.5px;margin-left:8px"></div> جاري التحقق...';
      btn.style.color = '#999'; btn.disabled = true;
      setTimeout(()=>{
        localStorage.setItem('pf_user', JSON.stringify({
          name:'لاعب',email:'player@gmail.com',
          avatar:null, joined:new Date().toISOString()
        }));
        window.location.href='feed.html';
      },1600);
    }
    function guestLogin(){
      localStorage.setItem('pf_guest','1');
      window.location.href='feed.html';
    }
  </script>
</body>
</html>
